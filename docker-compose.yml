services:
  portal:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3001}
      DB_FILE: /app/server/data/dac.db
      UPLOAD_DIR: /app/server/uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-DAC <no-reply@dac.local>}
      COMPANY_NAME: ${COMPANY_NAME:-Distribution Alimentaire Chevalier}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-}
      COMPANY_PHONE: ${COMPANY_PHONE:-}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-}
      COMPANY_GST: ${COMPANY_GST:-}
      COMPANY_QST: ${COMPANY_QST:-}
    volumes:
      - portal-data:/app/server/data
      - portal-uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: alpine:3
    restart: unless-stopped
    depends_on:
      - portal
    volumes:
      - portal-data:/data:ro
      - ./backups:/backups
    command: >
      sh -c "apk add --no-cache sqlite gzip coreutils &&
             while true; do
               ts=$$(date +%Y%m%d-%H%M%S);
               sqlite3 /data/dac.db \".backup '/tmp/dac.db'\" && gzip -c /tmp/dac.db > /backups/dac-$${ts}.db.gz && rm /tmp/dac.db;
               find /backups -name 'dac-*.db.gz' -mtime +30 -delete;
               sleep 86400;
             done"

volumes:
  portal-data:
  portal-uploads:
